<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <meta http-equiv="X-Frame-Options" content="deny">-->
    <title>Car Garage Manager</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="./media/car.png" class="logo-img">
        <h1>Car Garage Manager</h1>
    </header>
    <nav class="navbar">
        <ul class="navigation">
            <li>Alle</li>
            <li>Straße</li>
            <li>Offroad</li>
            <li>Rennstrecke</li>
            <li>Rallye</li>
            <li>Zweirad</li>
            <li>Quads</li>
        </ul>
    </nav>
        <div class="add-cars">
        <button class="delBtn"><span>-</span></button>
        <form action="" method="post" class="">
            <input type="text" name="text-field" id="text-field" placeholder="Click here and enter your vehicle">
        </form>
        <button class="addBtn"><span>+</span></button>
    </div>
    
    <section class="card-section" id="card-showcase">

    </section>
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <h1 class="modal-header">Zum erstellen eines Fahrzeugs bitte folgende Daten angeben</h1>
            <form action="" method="post" class="createForm">
                <label for="marke">Marke: </label>
                <input type="text" name="marke" id="marke" required>
                <label for="modell">Modell: </label>
                <input type="text" name="modell" id="modell" required>
                <label for="baujahr">Baujahr: </label>
                <input type="text" name="baujahr" id="baujahr" required>
                <label for="motorcode">Motorcode: </label>
                <input type="text" name="motorcode" id="motorcode" required>
                <div class="submitBtn-box">
                <button type="submit" class="submitBtn">Anlegen</button>
                </div>
            </form>
        </div>
        <div id="exitBtn">X</div>
    </div>

    <script src="./src/main.js"></script>
</body>
</html>
